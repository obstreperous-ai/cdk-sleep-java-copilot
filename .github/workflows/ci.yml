name: CI

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CDK CLI
        run: npm install --global aws-cdk

      - name: Run Maven tests
        run: mvn --batch-mode test

      - name: Run CDK synth (default environment)
        run: cdk synth

      - name: Test multi-environment support - dev
        run: cdk synth -c environment=dev

      - name: Test multi-environment support - stage
        run: cdk synth -c environment=stage

      - name: Test multi-environment support - prod
        run: cdk synth -c environment=prod
